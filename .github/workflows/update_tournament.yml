name: "StartGG: Update Tournament"

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: chore-update-branch
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-tournament:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare chore-update branch
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin chore-update || true
          if git show-ref --verify --quiet refs/remotes/origin/chore-update; then
            git checkout -B chore-update origin/chore-update
          else
            git checkout -B chore-update
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip requests

      - name: Download tournaments (JP only)
        id: download_tournaments
        env:
          STARTGG_TOKEN: ${{ secrets.STARTGG_TOKEN }}
        run: |
          set -euxo pipefail
          TODAY_JST="$(TZ=Asia/Tokyo date +%F)"
          YESTERDAY_JST="$(TZ=Asia/Tokyo date -d '1 day ago' +%F)"
          echo "today_jst=$TODAY_JST" >> "$GITHUB_OUTPUT"
          echo "yesterday_jst=$YESTERDAY_JST" >> "$GITHUB_OUTPUT"

          python scripts/fetch/download.py \
            --token "$STARTGG_TOKEN" \
            --country_code "JP" \
            --finish_date "$TODAY_JST"

          python scripts/fetch/download.py \
            --token "$STARTGG_TOKEN" \
            --country_code "JP" \
            --finish_date "$YESTERDAY_JST"

      - name: Run tests
        run: |
          set -euxo pipefail
          python -m unittest scripts.test.test_validate_data

      - name: Update chore tournament log
        run: |
          set -euxo pipefail
          python scripts/fix/update_chore_tournament_log.py \
            --mark-start "${{ steps.download_tournaments.outputs.yesterday_jst }}" \
            --mark-end "${{ steps.download_tournaments.outputs.today_jst }}" \
            --workflow "update_tournament"

      - name: Detect changes
        id: detect_changes
        run: |
          set -euxo pipefail
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "changed_files_count=0" >> "$GITHUB_OUTPUT"
            echo "No changes to create PR."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_files_count=$(git diff --name-only | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"
            git status --short
          fi

      - name: Commit changes
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          set -euxo pipefail
          git add -A
          git commit -m "chore(data): update tournament data"

      - name: Push chore-update branch
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          set -euxo pipefail
          for attempt in 1 2 3; do
            if git push --set-upstream origin chore-update; then
              exit 0
            fi
            git pull --rebase origin chore-update
          done
          exit 1

      - name: Ensure main PR uses rebase auto-merge
        if: steps.detect_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          PR_NUMBER="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head chore-update \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -z "$PR_NUMBER" ]; then
            PR_URL="$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head chore-update \
              --title "chore(data): sync chore-update into main" \
              --body "Automated data update PR from \`chore-update\` into \`main\`." )"
            PR_NUMBER="${PR_URL##*/}"
          fi

          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --auto \
            --rebase

      - name: Debug on failure
        if: failure()
        run: |
          echo "Workflow failed."
          git status --porcelain
          ls -la data/startgg
