name: "StartGG: Update User"

on:
  schedule:
    - cron: "5 18 * * *"
  workflow_dispatch:

concurrency:
  group: chore-update-branch
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-user:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare chore-update branch
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin chore-update || true
          if git show-ref --verify --quiet refs/remotes/origin/chore-update; then
            git checkout -B chore-update origin/chore-update
          else
            git checkout -B chore-update
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip requests

      - name: Refresh users
        env:
          STARTGG_TOKEN: ${{ secrets.STARTGG_TOKEN }}
        run: |
          set -euxo pipefail
          python scripts/fetch/refresh_users.py \
            --token "$STARTGG_TOKEN" \
            --max_users 300 \
            --cursor_path "data/startgg/users_refresh_cursor.txt"

      - name: Detect changes
        id: detect_changes
        run: |
          set -euxo pipefail
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "changed_files_count=0" >> "$GITHUB_OUTPUT"
            echo "No changes to create PR."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_files_count=$(git diff --name-only | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"
            git status --short
          fi

      - name: Commit changes
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          set -euxo pipefail
          git add -A
          git commit -m "chore(data): update user data"

      - name: Push chore-update branch
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          set -euxo pipefail
          for attempt in 1 2 3; do
            if git push --set-upstream origin chore-update; then
              exit 0
            fi
            git pull --rebase origin chore-update
          done
          exit 1

      - name: Debug on failure
        if: failure()
        run: |
          echo "Workflow failed."
          git status --porcelain
          ls -la data/startgg
