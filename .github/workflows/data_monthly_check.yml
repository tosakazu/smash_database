name: "StartGG: Monthly Check"

on:
  schedule:
    - cron: "10 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: chore-update-branch
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare chore-update branch
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin chore-update || true
          if git show-ref --verify --quiet refs/remotes/origin/chore-update; then
            git checkout -B chore-update origin/chore-update
          else
            git checkout -B chore-update
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check and apply tournaments.jsonl path fixes
        id: sync_tournaments
        continue-on-error: true
        env:
          STARTGG_TOKEN: ${{ secrets.STARTGG_TOKEN }}
        run: |
          set -euxo pipefail
          python scripts/fix/check_events_in_tournaments.py \
            --apply \
            --token "$STARTGG_TOKEN"

      - name: Refresh chore tournament log
        if: always()
        run: |
          set -euxo pipefail
          python scripts/fix/update_chore_tournament_log.py

      - name: Detect changes
        id: detect_changes
        if: always()
        run: |
          set -euxo pipefail
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "changed_files_count=0" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_files_count=$(git diff --name-only | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"
            git status --short
          fi

      - name: Commit changes
        if: always() && steps.detect_changes.outputs.has_changes == 'true'
        run: |
          set -euxo pipefail
          git add -A
          git commit -m "chore(data): sync missing event paths"

      - name: Push chore-update branch
        if: always() && steps.detect_changes.outputs.has_changes == 'true'
        run: |
          set -euxo pipefail
          for attempt in 1 2 3; do
            if git push --set-upstream origin chore-update; then
              exit 0
            fi
            git pull --rebase origin chore-update
          done
          exit 1

      - name: Fail when checks did not pass
        if: always()
        run: |
          set -euxo pipefail
          failed=0

          if [ "${{ steps.sync_tournaments.outcome }}" != "success" ]; then
            echo "sync_tournaments failed"
            failed=1
          fi

          exit "$failed"
